<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPI Selection - Clean & Simple</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0984e3;
            --main-text: #2d3436;
            --sub-text: #636e72;
            --bg-color: #f8f9fa; /* สีนวลขาวสะอาด */
            --border-color: #dfe6e9;
        }

        body { 
            font-family: 'Sarabun', sans-serif; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            color: var(--main-text);
        }

        .card {
            background: #ffffff;
            padding: 3rem 2rem;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); /* เงาบางๆ ให้พอดูมีมิติ */
            text-align: center;
            max-width: 450px;
            width: 90%;
            border: 1px solid var(--border-color);
        }

        h2 { 
            font-size: 1.8rem;
            margin: 0 0 0.5rem 0;
            font-weight: 800;
            color: var(--main-text);
        }

        .subtitle {
            color: var(--sub-text);
            font-size: 1rem;
            margin-bottom: 2rem;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 1.5rem 0 1rem 0;
        }

        .section-label {
            font-size: 1rem;
            font-weight: 600; 
            color: var(--primary);
            background: rgba(9, 132, 227, 0.08);
            padding: 4px 16px;
            border-radius: 50px;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn { 
            display: block;
            padding: 14px; 
            text-decoration: none; 
            border-radius: 12px; 
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s ease;
            border: 1px solid var(--border-color);
            background: #ffffff;
            color: var(--main-text);
        }

        .btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(9, 132, 227, 0.02);
        }

        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .pill-link {
            padding: 12px;
            background: #f1f2f6;
            border-radius: 10px;
            text-decoration: none;
            color: var(--main-text);
            font-size: 0.9rem;
            font-weight: 600;
            transition: 0.2s;
        }

        .pill-link:hover {
            background: var(--main-text);
            color: #ffffff;
        }

        .divider {
            height: 1px;
            background: var(--border-color);
            margin: 1.5rem 0;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>ระบบรายงานสถิติ</h2><h2>การจัดเก็บดัชนีราคาผู้บริโภค (CPI)</h2>
        <div class="subtitle">เลือกชุดข้อมูลที่ต้องการตรวจสอบ</div>
        
        <div class="divider"></div>

        <div class="section-header">
            <div class="section-label">📊 จำนวนการเก็บข้อมูล</div>
        </div> 

        <div class="btn-group">
            <!-- <a href="G/index.html" class="btn">ชุดข้อมูลทั่วไป</a>
            <a href="U/index.html" class="btn">ชุดข้อมูลนอกเขต</a> -->
            
            <div class="grid-container">
                <a href="G/index.html" class="pill-link">ชุดทั่วไป (เว็บ)</a>
                <a href="U/index.html" class="pill-link">ชุดนอกเขต (เว็บ)</a>
                <a href="URL_HERE" target="_blank" class="pill-link">📦 ชุดทั่วไป (ตาราง)</a>
                <a href="URL_HERE" target="_blank" class="pill-link">📦 ชุดนอกเขต (ตาราง)</a>
            </div>

            <div class="divider"></div>

            <div class="section-header">
                <div class="section-label">📋 ราคากลาง</div>
            </div>

            <div class="grid-container">
                <a href="URL_HERE" target="_blank" class="pill-link">📄 ชุด บ</a>
                <a href="URL_HERE" target="_blank" class="pill-link">📄 ชุด บ1</a>
                <a href="URL_HERE" target="_blank" class="pill-link">📄 ชุด น</a>
                <a href="URL_HERE" target="_blank" class="pill-link">📄 ชุด อ</a>
            </div>
        </div>
    </div>

</body>
</html>
